<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Slide Kuliah - Dr. Khozin Mu'tamar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Slide Kuliah</h1>

    <p class="subtitle">
        Seluruh slide yang tersedia merupakan versi terbaru.
    </p>

    <div id="content"></div>

</div>

<script>

const USER = "kmutamar";
const REPO = "SLIDE-KULIAH";

const folders = [
    "FVK",
    "PON",
    "PKL",
    "TKO"
];

const judul = {
    "FVK":"Fungsi Peubah Kompleks",
    "PON":"Pengantar Optimisasi Numerik",
    "PKL":"Pengantar Kontrol Linier",
    "TKO":"Teori Kontrol Optimum"
};

async function loadFolder(folder){

    const url =
    `https://api.github.com/repos/${USER}/${REPO}/contents/${folder}`;

    const response = await fetch(url);

    const files = await response.json();

    let html = "";

    html += `<section>`;
    html += `<h2>${judul[folder] ?? folder}</h2>`;
    html += `<ul>`;

    files
        .filter(f => f.name.toLowerCase().endsWith(".pdf"))
        .sort((a,b)=>a.name.localeCompare(b.name))
        .forEach(file=>{

            let nama=file.name
                .replace(".pdf","")
                .replace(/--/g," ")
                .replace(/-/g," ");

            html += `
            <li>
            <a href="${file.download_url}" target="_blank">
            ${nama}
            </a>
            </li>`;
        });

    html += `</ul>`;
    html += `</section>`;

    return html;
}

async function loadWebsite(){

    let hasil="";

    for(const folder of folders){
        hasil += await loadFolder(folder);
    }

    document.getElementById("content").innerHTML=hasil;

}

loadWebsite();

</script>

</body>
</html>
